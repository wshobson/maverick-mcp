name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    # Forked pull_request runs do not receive repository secrets/OIDC, so keep
    # the action off for forks and skip it below if the token is not configured.
    if: >
      github.event.pull_request.draft == false &&
      github.actor != 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    env:
      HAS_CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}

    steps:
      - name: Skip Claude Code Review
        if: env.HAS_CLAUDE_CODE_OAUTH_TOKEN != 'true'
        run: echo "Skipping Claude Code Review because CLAUDE_CODE_OAUTH_TOKEN is not configured."

      - name: Checkout repository
        if: env.HAS_CLAUDE_CODE_OAUTH_TOKEN == 'true'
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect Claude review workflow changes
        if: env.HAS_CLAUDE_CODE_OAUTH_TOKEN == 'true'
        id: claude-workflow
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if git diff --name-only "origin/${BASE_REF}"...HEAD | grep -Fxq ".github/workflows/claude-code-review.yml"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Claude Code Review for workflow changes
        if: env.HAS_CLAUDE_CODE_OAUTH_TOKEN == 'true' && steps.claude-workflow.outputs.changed == 'true'
        run: echo "Skipping Claude Code Review because this PR changes the Claude review workflow."

      - name: Run Claude Code Review
        if: env.HAS_CLAUDE_CODE_OAUTH_TOKEN == 'true' && steps.claude-workflow.outputs.changed != 'true'
        id: claude-review
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          track_progress: true

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a PR for MaverickMCP — a personal-use MCP
            server for Claude Desktop providing stock analysis, technical
            indicators, screening, portfolio tracking, backtesting, and
            multi-agent research. The stack is Python 3.12 + FastMCP +
            SQLAlchemy + pandas + LangChain/LangGraph + vectorbt. Read
            `CLAUDE.md` at the repo root for full architecture and
            conventions before starting.

            ## Review checklist (priority order)

            1. **Runtime bugs** — NameErrors, TypeErrors, unhandled
               `None`, wrong awaits (e.g. `asyncio.to_thread` on an async
               function), NaN/inf leaking into JSON responses,
               unbounded retries, deadlocks in async code.

            2. **Silent failures** — Error paths that swallow exceptions
               or mask real failures; fallbacks that hide downstream
               outages; bare `except:` blocks; wide `except Exception`
               that turns a programmer error into a user-facing message.

            3. **API contract violations** — MCP tool return types must
               be JSON-serializable (no Pydantic models, numpy arrays,
               pandas Series leaking out unconverted). Tool name
               collisions between routers and `server.py`. Schema drift
               between SQLAlchemy models and the queries against them.

            4. **Security & boundary issues** — SQL injection in raw
               queries, command injection in CI, leaked secrets, unsafe
               deserialization, missing input validation at MCP-tool
               boundaries.

            5. **Tests** — New behavior should have tests in `tests/`
               (markers: `not integration and not slow and not external`
               for the unit lane). Flag missing coverage only for
               non-trivial changes. Watch for tests that no longer
               assert what their name claims (e.g. `eval` vs
               `json.loads`).

            ## Output rules

            - Use inline comments
              (`mcp__github_inline_comment__create_inline_comment`) for
              issues tied to a specific line. One sentence per finding.
            - End with a single `gh pr comment` summary, ≤10 lines,
              grouping findings by severity (Bugs / Warnings / Notes).
              If clean, post a one-line LGTM with what looks good.
            - Only report issues you have HIGH confidence in (>80%). No
              speculation.
            - Do NOT comment on formatting, import order, or naming —
              ruff handles that.
            - Do NOT suggest doc additions.
            - Do NOT make architecture critiques unrelated to the diff
              ("this file is too big", "consider extracting…").

          claude_args: |
            --model claude-opus-4-8
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh search:*),Read,Grep,Glob"
