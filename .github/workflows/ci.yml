name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --extra dev --frozen
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Import contracts
        run: uv run lint-imports

  docs:
    name: Docs catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Check docs catalog
        run: make docs-check

  typecheck:
    name: Type check (ty, baseline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync dependencies
        # `--extra backtesting` pulls in vectorbt/numba/scikit-learn/scipy/
        # pandas-ta: maverick_mcp/services/signals/{regime,conditions}.py
        # import pandas_ta at module scope, and that module sits inside the
        # strict zone below, so ty needs it resolvable to type-check cleanly.
        # `--extra research` is deliberately NOT added here: grepped the
        # strict zone (maverick/, maverick_mcp/services/, maverick_mcp/
        # domain/) for langchain/langchain-anthropic/langchain-community/
        # langchain-openai/langgraph/exa-py imports at any scope and found
        # zero hits, so ty resolves this zone cleanly without the extra.
        run: uv sync --extra dev --extra backtesting --frozen
      # Baseline run over the full package: do not block PRs while
      # the LangChain/LangGraph integration surface still emits the
      # bulk of diagnostics (~790 today).
      - name: ty check, full package (informational)
        continue-on-error: true
        run: uv run ty check maverick_mcp
      # Strict-zone run over the v1 package, service-layer, and domain
      # packages. Now gated: any new diagnostic in this scope fails the job.
      - name: ty check, strict zone (maverick/ + services/ + domain/)
        run: uv run ty check maverick maverick_mcp/services maverick_mcp/domain

  test-unit:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    env:
      MAVERICK_TEST_ENV: "true"
      TIINGO_API_KEY: "ci-dummy-key"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync dependencies
        # `--extra dev` pulls in pytest, testcontainers, etc. Required
        # because tests/conftest.py imports `testcontainers.postgres`
        # at collection time even though those fixtures are not used
        # by the unit-only marker selection below. `--extra backtesting`
        # pulls in vectorbt/numba/scikit-learn/scipy/pandas-ta, now moved
        # out of the core dependency set: both the legacy
        # `maverick_mcp/backtesting/**` tests and the new `tests/backtesting`
        # tree import them at collection time. `--extra research` pulls in
        # langchain/langchain-anthropic/langchain-community/langchain-openai/
        # langgraph/exa-py, now moved out of the core dependency set: the
        # legacy `maverick_mcp/agents/**` and `maverick_mcp/tests/**` trees
        # still import them at collection time until Phase 7 cutover.
        run: uv sync --extra dev --extra backtesting --extra research --frozen
      - name: Run unit tests
        run: |
          uv run pytest \
            -m "not integration and not slow and not external" \
            --maxfail=5 \
            --timeout=60
