# Model profiles for intelligent LLM selection via OpenRouter.
#
# Each entry defines a model's capabilities, costs, and best-fit task types.
# Cost values are in USD per million tokens.
# Speed and quality ratings are on a 1-10 scale.
#
# Task types:
#   deep_research, market_analysis, technical_analysis, sentiment_analysis,
#   risk_assessment, result_synthesis, portfolio_optimization,
#   query_classification, quick_answer, complex_reasoning,
#   multi_agent_orchestration, general

# Premium models (use sparingly for critical tasks)
anthropic/claude-opus-4.1:
  name: "Claude Opus 4.1"
  provider: anthropic
  context_length: 200000
  cost_per_million_input: 15.0
  cost_per_million_output: 75.0
  speed_rating: 7
  quality_rating: 10
  best_for:
    - complex_reasoning
  temperature: 0.3

